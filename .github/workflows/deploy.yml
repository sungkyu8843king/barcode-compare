name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_vRYHrhGINWQLfGEFMbuRbgES
          VERCEL_PROJECT_ID: prj_S5KBgBHKjJDCQvLMAf1HDouK2ECu
